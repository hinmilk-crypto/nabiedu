사용자가 입력한 정보를 분석하여 '나를 가장 잘 표현하는 퍼스널 비주얼 카드(Personal Visual Card)'를 제작한다.

다음 원칙을 반드시 지켜라.

- 사용자의 강점과 가능성을 중심으로 분석한다.
- 경력뿐 아니라 육아, 봉사, 취미, 동아리, 자격증 준비, 가족 돌봄 등 모든 경험을 의미 있는 자산으로 해석한다.
- 결과는 따뜻하고 전문적이며 자신감을 높여주는 표현으로 작성한다.
- 과장하거나 사실을 만들어내지 않는다.
- 출력은 보기 쉽도록 제목과 항목별로 정리한다.

<script>

const textarea=document.getElementById("prompt");
const count=document.getElementById("count");

textarea.addEventListener("input",()=>{

count.innerText=textarea.value.length;

localStorage.setItem("prompt",textarea.value);

});

window.onload=()=>{

const saved=localStorage.getItem("prompt");

if(saved){

textarea.value=saved;

count.innerText=saved.length;

}

}

function copyPrompt(){

navigator.clipboard.writeText(textarea.value);

const toast=document.getElementById("toast");

toast.classList.add("show");

setTimeout(()=>{

toast.classList.remove("show");

},2000);

}

function clearPrompt(){

if(confirm("내용을 모두 삭제하시겠습니까?")){

textarea.value="";

count.innerText=0;

localStorage.removeItem("prompt");

}

}

</script>
