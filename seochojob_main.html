```html
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 퍼스널 비주얼 카드 만들기</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

:root{
--primary:#6C63FF;
--secondary:#8B7FFF;
--mint:#57D9C4;
--bg:#f5f7fb;
--card:#ffffff;
--text:#333;
--shadow:0 15px 40px rgba(0,0,0,.08);
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Pretendard, sans-serif;
}

body{
background:linear-gradient(135deg,#f8fbff,#eef2ff);
color:var(--text);
}

.hero{
padding:70px 20px;
text-align:center;
background:
radial-gradient(circle at top right,#dcd7ff 0%,transparent 35%),
radial-gradient(circle at bottom left,#d9fff7 0%,transparent 35%);
}

.hero h3{
color:var(--primary);
font-size:18px;
margin-bottom:15px;
}

.hero h1{
font-size:52px;
font-weight:800;
margin-bottom:15px;
}

.hero p{
font-size:20px;
color:#666;
}

.hero .icon{
font-size:65px;
margin-bottom:20px;
animation:float 3s ease-in-out infinite;
}

@keyframes float{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-10px);}
}

.wrapper{
max-width:1000px;
margin:auto;
padding:40px 20px 70px;
}

.card{
background:white;
border-radius:24px;
padding:30px;
margin-bottom:25px;
box-shadow:var(--shadow);
}

.card h2{
margin-bottom:20px;
color:var(--primary);
}

.steps{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:15px;
}

.step{
background:#f7f8ff;
border-radius:18px;
padding:20px;
text-align:center;
}

.step span{
display:inline-block;
width:45px;
height:45px;
line-height:45px;
border-radius:50%;
background:var(--primary);
color:white;
font-weight:bold;
margin-bottom:12px;
}

textarea{
width:100%;
height:320px;
padding:20px;
border-radius:16px;
border:2px solid #e3e5ef;
font-size:16px;
resize:vertical;
outline:none;
}

textarea:focus{
border-color:var(--primary);
}

.counter{
text-align:right;
margin-top:8px;
color:#888;
font-size:14px;
}

.buttons{
display:flex;
gap:15px;
flex-wrap:wrap;
margin-top:20px;
}

button{
flex:1;
padding:18px;
border:none;
border-radius:14px;
font-size:17px;
font-weight:600;
cursor:pointer;
transition:.25s;
}

.copy{
background:var(--primary);
color:white;
}

.copy:hover{
transform:translateY(-2px);
}

.clear{
background:#ececec;
}

.links{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.link-btn{
display:flex;
justify-content:center;
align-items:center;
padding:22px;
border-radius:18px;
text-decoration:none;
font-size:20px;
font-weight:700;
color:white;
transition:.2s;
}

.gallery{
background:linear-gradient(135deg,#6C63FF,#897CFF);
}

.prompt{
background:linear-gradient(135deg,#3BC9DB,#57D9C4);
}

.link-btn:hover{
transform:translateY(-4px);
}

footer{
padding:40px;
text-align:center;
color:#888;
}

.toast{
position:fixed;
bottom:30px;
right:30px;
background:#222;
color:white;
padding:16px 25px;
border-radius:12px;
opacity:0;
transition:.3s;
pointer-events:none;
}

.toast.show{
opacity:1;
}

@media(max-width:768px){

.hero h1{
font-size:36px;
}

.hero p{
font-size:17px;
}

}

</style>
</head>

<body>

<section class="hero">

<div class="icon">🦋</div>

<h3>서초 여성 JOB FESTA</h3>

<h1>AI 퍼스널 비주얼 카드</h1>

<p>Discover Your Brand</p>

</section>

<div class="wrapper">

<div class="card">

<h2>📌 체험 방법</h2>

<div class="steps">

<div class="step">
<span>1</span>
<h4>프롬프트 작성</h4>
<p>아래 내용을 작성합니다.</p>
</div>

<div class="step">
<span>2</span>
<h4>프롬프트 복사</h4>
<p>버튼을 눌러 복사합니다.</p>
</div>

<div class="step">
<span>3</span>
<h4>AI 생성</h4>
<p>ChatGPT에 붙여넣기</p>
</div>

<div class="step">
<span>4</span>
<h4>패들렛 업로드</h4>
<p>완성작을 공유합니다.</p>
</div>

</div>

</div>

<div class="card">

<h2>✍ AI 프롬프트</h2>

<textarea id="prompt" placeholder="여기에 AI 프롬프트를 입력하세요."></textarea>

<div class="counter">
<span id="count">0</span> 글자
</div>

<div class="buttons">

<button class="copy" onclick="copyPrompt()">
📋 프롬프트 복사
</button>

<button class="clear" onclick="clearPrompt()">
🗑 초기화
</button>

</div>

</div>

<div class="card">

<h2>🔗 바로가기</h2>

<div class="links">

<a class="link-btn gallery"
href="https://padlet.com/갤러리주소"
target="_blank">

🖼 패들렛 갤러리

</a>

<a class="link-btn prompt"
href="https://padlet.com/프롬프트주소"
target="_blank">

📄 프롬프트 모음

</a>

</div>

</div>

</div>

<footer>

© 2026 서초나비코치단<br>
AI 퍼스널 비주얼 카드 체험부스

</footer>

<div id="toast" class="toast">
✔ 프롬프트가 복사되었습니다.
</div>

<script>

const textarea=document.getElementById("prompt");
const count=document.getElementById("count");

textarea.addEventListener("input",()=>{

count.innerText=textarea.value.length;

localStorage.setItem("prompt",textarea.value);

});

window.onload=()=>{

const saved=localStorage.getItem("prompt");

if(saved){

textarea.value=saved;

count.innerText=saved.length;

}

}

function copyPrompt(){

navigator.clipboard.writeText(textarea.value);

const toast=document.getElementById("toast");

toast.classList.add("show");

setTimeout(()=>{

toast.classList.remove("show");

},2000);

}

function clearPrompt(){

if(confirm("내용을 모두 삭제하시겠습니까?")){

textarea.value="";

count.innerText=0;

localStorage.removeItem("prompt");

}

}

</script>

</body>
</html>
```
