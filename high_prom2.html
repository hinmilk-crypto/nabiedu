<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>고등 AI 프롬프트</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:"Pretendard","맑은 고딕",sans-serif;
    background:#eef3f8;
    color:#333;
}

header{
    background:#0F766E;
    color:white;
    padding:30px 20px;
    text-align:center;
}

header h1{
    font-size:32px;
    margin-bottom:10px;
}

header p{
    opacity:.9;
}

.container{
    max-width:900px;
    margin:auto;
    padding:30px 20px;
}

.card{
    background:white;
    border-radius:18px;
    box-shadow:0 4px 12px rgba(0,0,0,.08);
    padding:25px;
    margin-bottom:25px;
}

.card h2{
    color:#0F766E;
    margin-bottom:15px;
}

textarea{
    width:100%;
    height:280px;
    border:1px solid #ddd;
    border-radius:12px;
    padding:15px;
    resize:none;
    background:#fafafa;
    font-size:15px;
    line-height:1.7;
}

button{
    width:100%;
    margin-top:15px;
    padding:15px;
    border:none;
    border-radius:12px;
    background:#0F766E;
    color:white;
    font-size:17px;
    font-weight:bold;
    cursor:pointer;
    transition:.2s;
}

button:hover{
    background:#115E59;
}

footer{
    text-align:center;
    padding:30px;
    color:#888;
}
</style>
</head>

<body>

<header>
<h1>🎓 고등 AI 프롬프트</h1>
<p>복사 버튼을 눌러 제미나이에 붙여 넣으세요.</p>
</header>

<div class="container">

<div class="card">
<h2>2. 나는 어떤 상품일까?</h2>

<textarea id="p2">나는 ___이다.

그 상품이 가진 기능, 특징, 성격을 활용해서 나의 ___ 모습과 어떻게 닮았는지 예시를 들어 설명하고 네 줄 이내로 써줘.</textarea>

<button onclick="copyText('p2')">📋 복사하기</button>
</div>

<div class="card">
<h2>2-1. 나는 어떤 상품일까?(상품을 못 떠올렸을 경우)</h2>

<textarea id="p2-2">너는 고등학교 진로·브랜딩 전문가야.

내 소개를 읽고 내가 닮은 상품을 5가지 추천해줘.
(전자제품, 생활용품, 음식, 문구, 운동용품 등 무엇이든 가능)

각 상품마다
- 왜 나와 닮았는지
- 어떤 성격이나 장점을 닮았는지
- 학교생활에서의 예시

를 간단히 설명해줘.

마지막에는 가장 잘 어울리는 상품 하나를 골라

'나는 ○○이다.'

로 시작하는 4줄 이내의 글을 작성해줘.

내 소개: (여기에 학생 소개 입력)</textarea>

<button onclick="copyText('p2-2')">📋 복사하기</button>
</div>

<div class="card">
<h2>3. 나의 매력 보고서 (삼행시)</h2>

<textarea id="p3" >아래의 소개 내용을 분석한 후 이름 삼행시(20~30자내외)를 지어줘.

내 이름은 000이야.

나의 흥미는 ___

내가 잘하는 것(강점)은 ___

내가 세상에 전하고 싶은 가장 소중한 메시지(가치)는 ___.</textarea>

<button onclick="copyText('p3')">📋 복사하기</button>
</div>

<div class="card">
<h2>4-1. AI와 함께하는 커리어 로드맵(전공선택)</h2>

<textarea id="p41" >내게 맞는 전공 찾기 
너는 진로 컨설턴트야.
내 정보를 보고 나에게 잘 맞는 대학 전공 3개를 추천해줘.

1. 나의 정체성: (이름삼행시)
2. 나의 색깔과 상품 특징:
3. 나의 흥미:
4. 나의 강점:
5. 내가 추구하는 가치:
6. 희망 전공계열:
7. 추가로 AI가 참고하면 좋을 내용(선택) : (좋아하는 과목, 잘하는 과목, 싫거나 어려운 것, 해보고 싶은 활동, 관심있는 직업, 롤모델 등)

각 전공마다

1. 나와 잘 맞는 이유
2. 대학에서 배우는 내용
3. 졸업 후 진로를 간단하게 알려줘.

난 고1이야.</textarea>

<button onclick="copyText('p41')">📋 복사하기</button>
</div>

<div class="card">
<h2>4-2. AI와 함께하는 커리어 로드맵(선택과목)</h2>

<textarea id="p42">선택과목 추천받기 
너는 입시 전문가야.
내 정보를 보고 고2 선택과목을 추천해줘.

1. 나의 정체성: (이름삼행시)
2. 나의 색깔과 상품 특징:
3. 나의 흥미:
4. 나의 강점:
5. 내가 추구하는 가치:
6. 희망 전공계열:
7. 추가로 AI가 참고하면 좋을 내용(선택) : (좋아하는 과목, 잘하는 과목, 싫거나 어려운 것, 해보고 싶은 활동, 관심있는 직업, 롤모델 등)

다음 내용을 알려줘.

1. 추천 선택과목
2. 나에게 유리한 이유
3. 주의할 과목
4. 지금부터 준비할 점
난 고1이야.</textarea>

<button onclick="copyText('p42')">📋 복사하기</button>
</div>

<div class="card">
<h2>4-2. AI와 함께하는 커리어 로드맵(세특 전략)</h2>

<textarea id="p43" >너는 학생부 전문가야.

내 정보를 바탕으로 고1 학생 기준 세특 준비 전략을 알려줘.

1. 나의 정체성: (이름삼행시)
2. 나의 색깔과 상품 특징:
3. 나의 흥미:
4. 나의 강점:
5. 내가 추구하는 가치:
6. 희망 전공계열:
7. 추가로 AI가 참고하면 좋을 내용(선택) : (좋아하는 과목, 잘하는 과목, 싫거나 어려운 것, 해보고 싶은 활동, 관심있는 직업, 롤모델 등)

다음 내용을 알려줘.

1. 과목별 세특에 좋은 행동
2. 발표 주제 추천
3. 수업시간 질문 예시
4. 지금부터 실천할 점

난 고1이야.</textarea>

<button onclick="copyText('p43')">📋 복사하기</button>
</div>

<div class="card">
<h2>5. 나의 브랜드 만들기</h2>

<textarea id="p44">너는 학생들의 강점을 발견하는 최고의 퍼스널 브랜딩 전문가야.

내가 작성한 내용을 바탕으로 나의 성격, 강점, 가치관, 관심사를 종합적으로 분석하여 나를 가장 잘 표현하는 퍼스널 브랜드 3가지를 만들어 줘.

각 브랜드는 다음 항목을 포함해 작성해 줘.

1. 브랜드 이름
학생의 개성과 강점이 잘 드러나는 창의적인 이름
짧고 세련된 이름으로 만들며, 실제 스타트업이나 패션·IT 브랜드처럼 트렌디하고 힙한 감성을 담아 한 단어 또는 줄임말(Acronym), 한글·영어·혼합형 네이밍을 사용하고, 설명형 복합명사 대신 학생의 강점을 상징적으로 표현한 기억하기 쉬운 브랜드이름

2. 브랜드 의미
브랜드 이름에 담긴 의미와 학생의 특징을 연결하여 설명

3. 브랜드 슬로건
나를 표현하는 짧고 기억하기 쉬운 한 문장

4. 이 브랜드가 나와 잘 맞는 이유
입력한 내용을 바탕으로 어떤 점이 이 브랜드와 연결되는지 구체적으로 설명

5. 핵심 강점 키워드
나를 가장 잘 나타내는 핵심 키워드 5개

6. 한 줄 자기소개
학교에서 친구나 선생님께 자신을 소개할 때 사용할 수 있는 자기소개 문장

7. 나의 성장 포인트
앞으로 더 발전시키면 좋은 역량이나 습관 3가지를 긍정적으로 제안

8. 나만의 브랜드 한 줄 정의
'나는 ○○한 사람이다.' 형식으로 나의 정체성을 한 문장으로 정리

작성 조건
* 고등학교 1학년 학생의 눈높이에 맞게 작성한다.
* 긍정적이고 현실적인 표현을 사용한다.
* 단순한 성격 분석이 아니라 학생의 가능성과 성장 가능성을 중심으로 작성한다.
* 결과는 학교생활, 자기소개, 발표, 학생부 활동 등에 활용할 수 있도록 구체적이고 이해하기 쉽게 작성한다.
</textarea>

<button onclick="copyText('p44')">📋 복사하기</button>
</div>
    
</div>

    
<footer>

<script>
function copyText(id){
    const text=document.getElementById(id).value;

    navigator.clipboard.writeText(text).then(function(){
        alert("✅ 프롬프트가 복사되었습니다.");
    }).catch(function(){
        const area=document.getElementById(id);
        area.select();
        document.execCommand("copy");
        alert("✅ 프롬프트가 복사되었습니다.");
    });
}
</script>

</body>
