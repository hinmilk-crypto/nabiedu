<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 프롬프트 복사 페이지</title>

<style>
*{box-sizing:border-box;}
body{
    margin:0;
    font-family:"Pretendard","맑은 고딕",sans-serif;
    background:#f3f6fb;
    color:#333;
}

header{
    background:#5B7CFA;
    color:white;
    text-align:center;
    padding:30px 20px;
}

header h1{
    margin:0;
    font-size:30px;
}

header p{
    margin-top:10px;
    opacity:.9;
}

.container{
    max-width:900px;
    margin:auto;
    padding:25px;
}

.card{
    background:white;
    border-radius:18px;
    padding:25px;
    margin-bottom:25px;
    box-shadow:0 4px 12px rgba(0,0,0,.08);
}

.card h2{
    margin-top:0;
    color:#3F51B5;
}

textarea{
    width:100%;
    height:260px;
    resize:none;
    padding:15px;
    font-size:15px;
    line-height:1.7;
    border:1px solid #ddd;
    border-radius:12px;
    background:#fafafa;
}

button{
    width:100%;
    margin-top:15px;
    padding:15px;
    font-size:17px;
    font-weight:bold;
    border:none;
    border-radius:12px;
    cursor:pointer;
    background:#5B7CFA;
    color:white;
    transition:.2s;
}

button:hover{
    background:#3F51B5;
}

footer{
    text-align:center;
    color:#888;
    padding:30px;
    font-size:14px;
}
</style>
</head>

<body>

<header>
<h1>🤖 AI 프롬프트 복사(중학생용)</h1>
<p>복사 버튼을 눌러 제미나이에 붙여넣으세요.</p>
</header>

<div class="container">

<div class="card">
<h2>2. 나는 어떤 상품일까?</h2>

<textarea id="prompt1" readonly>나는 ___이다.

그 상품이 가진 기능, 특징, 성격을 활용해서 나의 ___ 모습과 어떻게 닮았는지 예시를 들어 설명하고 네 줄 이내로 써줘.</textarea>

<button onclick="copyPrompt('prompt1')">📋 복사하기</button>
</div>

<div class="card">
<h2>4-1. AI와 함께하는 커리어 로드맵</h2>

<textarea id="prompt2" readonly>너는 지금부터 최고의 퍼스널 브랜딩 전문가이자 커리어 컨설턴트야.

나의 데이터들을 분석해서, 내가 도전해 볼 만한 미래 직업 3가지와 그 이유를 알려줘.

1. 나의 정체성: (이름 삼행시)

2. 나의 색깔과 특성:

3. 나의 강점:

4. 내가 추구하는 가치:

5. 내가 관심있는 분야:

이 데이터들을 바탕으로

① 나에게 어울리는 직업 3가지

② 그 이유

③ 준비해야 할 역량

을 자세히 알려줘.</textarea>

<button onclick="copyPrompt('prompt2')">📋 복사하기</button>
</div>

<div class="card">
<h2>4-2. AI와 함께하는 커리어 로드맵</h2>

<textarea id="prompt3" readonly>너는 최고의 퍼스널 브랜딩 전문가이자 커리어 컨설턴트야.

이전 대화에 저장된 나의 이름 삼행시, 특징, 강점, 가치 데이터를 활용하고,

추가로 아래 내용을 반영해서

내가 도전해 볼 만한 미래 직업 3가지를 추천해줘.

관심 분야:

그리고 각 직업마다

- 왜 나와 잘 맞는지

- 준비해야 할 역량

- 앞으로 하면 좋은 활동

을 구체적으로 설명해줘.</textarea>

<button onclick="copyPrompt('prompt3')">📋 복사하기</button>
</div>

</div>

<footer>
AI 프롬프트 복사 페이지
</footer>

<script>
function copyPrompt(id){
    const text=document.getElementById(id).value;

    navigator.clipboard.writeText(text).then(()=>{
        alert("✅ 프롬프트가 복사되었습니다!");
    }).catch(()=>{
        const area=document.getElementById(id);
        area.select();
        document.execCommand("copy");
        alert("✅ 프롬프트가 복사되었습니다!");
    });
}
</script>

</body>
</html>
