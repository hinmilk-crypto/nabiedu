<script>
function copyText(id){
    const text=document.getElementById(id).value;

    navigator.clipboard.writeText(text).then(function(){
        alert("✅ 프롬프트가 복사되었습니다.");
    }).catch(function(){
        const area=document.getElementById(id);
        area.select();
        document.execCommand("copy");
        alert("✅ 프롬프트가 복사되었습니다.");
    });
}
