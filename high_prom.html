<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>고등 AI 프롬프트</title>

<style>
body{
    margin:0;
    font-family:'Pretendard','맑은 고딕',sans-serif;
    background:#eef3f8;
}

header{
    background:#0F766E;
    color:white;
    padding:30px;
    text-align:center;
}

.container{
    max-width:900px;
    margin:auto;
    padding:25px;
}

.card{
    background:white;
    margin-bottom:25px;
    padding:22px;
    border-radius:15px;
    box-shadow:0 3px 10px rgba(0,0,0,.08);
}

.card h2{
    margin-top:0;
    color:#0F766E;
}

textarea{
    width:100%;
    height:260px;
    resize:none;
    padding:15px;
    font-size:15px;
    line-height:1.7;
    border-radius:10px;
    border:1px solid #ccc;
    background:#fafafa;

    white-space:pre-wrap;
    overflow-wrap:break-word;
}

button{
    width:100%;
    margin-top:15px;
    padding:14px;
    font-size:17px;
    font-weight:bold;
    color:white;
    background:#0F766E;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

button:hover{
    background:#115E59;
}
</style>

</head>

<body>

<header>
<h1>🎓 고등 AI 프롬프트</h1>
<p>복사 버튼을 눌러 제미나이에 붙여 넣으세요.</p>
</header>

<div class="container" id="cards"></div>

<script>

const prompts=[

{
title:"2. 나는 어떤 상품일까?",
text:`나는 ___이다.

그 상품이 가진 기능, 특징, 성격을 활용해서 나의 ___ 모습과 어떻게 닮았는지 예시를 들어 설명하고 네 줄 이내로 써줘.`
},

{
title:"3. 나의 매력 보고서 (삼행시)",
text:`아래의 소개 내용을 분석한 후 이름 삼행시를 지어줘.

내 이름은 000이야.
나의 흥미는 ___
내가 잘하는 것(강점)은 ___
내가 세상에 전하고 싶은 가장 소중한 메시지(가치)는 ___.`
},

{
title:"4-1. AI와 함께하는 커리어 로드맵 (전공 찾기)",
text:`너는 진로 컨설턴트야.
내 정보를 보고 나에게 잘 맞는 대학 전공 3개를 추천해줘.

1. 나의 정체성:
2. 나의 색깔과 특징:
3. 나의 강점:
4. 내가 추구하는 가치:
5. 희망 전공계열:

각 전공마다

1. 나와 잘 맞는 이유
2. 대학에서 배우는 내용
3. 졸업 후 진로를 간단하게 알려줘.

난 고1이야.`
},

{
title:"4-2. AI와 함께하는 커리어 로드맵 (선택과목 추천)",
text:`너는 입시 전문가야.

내 정보를 보고 고2 선택과목을 추천해줘.

1. 나의 정체성:
2. 나의 색깔과 특징:
3. 나의 강점:
4. 내가 추구하는 가치:
5. 희망 전공계열:

다음 내용을 알려줘.

1. 추천 선택과목
2. 나에게 유리한 이유
3. 주의할 과목
4. 지금부터 준비할 점

난 고1이야.`
},

{
title:"4-3. AI와 함께하는 커리어 로드맵 (세특 전략)",
text:`너는 학생부 전문가야.

내 정보를 바탕으로 고1 학생 기준 세특 준비 전략을 알려줘.

1. 나의 정체성:
2. 나의 색깔과 특징:
3. 나의 강점:
4. 내가 추구하는 가치:
5. 희망 전공계열:

다음 내용을 알려줘.

1. 과목별 세특에 좋은 행동
2. 발표 주제 추천
3. 수업시간 질문 예시
4. 지금부터 실천할 점

난 고1이야.`
},

{
title:"5. 나의 브랜드 만들기",
text:`너는 대학교 입학사정관 출신 퍼스널 브랜딩 전문가이자 브랜드 전략가야.

학생의 강점과 잠재력을 분석하여 학생부와 포트폴리오에서 일관성 있게 활용할 수 있는 브랜드를  3가지를 만들어 줘.
이름과 의미, 각 브랜드의 슬로건을 한문장으로 정리해줘.
세부능력 및 특기사항(세특), 동아리, 탐구 프로젝트, 자율활동, 진로활동, 독서활동, 발표, 포트폴리오 등에서 이 브랜드를 어떻게 활용할 수 있는지 구체적인 예시를 제시해 줘.`
}

];

const container=document.getElementById("cards");

prompts.forEach((p,i)=>{

container.innerHTML+=`

<div class="card">

<h2>${p.title}</h2>

<textarea readonly id="t${i}">${p.text}</textarea>

<button onclick="copyText('t${i}')">📋 복사하기</button>

</div>

`;

});

function copyText(id){

navigator.clipboard.writeText(document.getElementById(id).value);

alert("✅ 복사되었습니다.");

}

</script>

</body>
</html>
